name: Linter

env:
  HUSKY: 0

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    paths:
      - "packages/**/*"
      - "packages/tooling-config/**/*"
      - "config/**/*"
      - "*.json"
      - "*.mjs"
      - ".github/workflows/linter.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Run TS Check
        run: bun run ts:check

      - name: Run Prettier
        run: bun run prettier

      - name: Run ESLint
        run: bun run lint

      - name: Run knip
        run: bun run knip --no-config-hints --reporter github-actions

      - name: Fetch base branch for fallow
        if: github.event_name == 'pull_request'
        run: git fetch --no-tags origin "${GITHUB_BASE_REF}:refs/remotes/origin/${GITHUB_BASE_REF}"

      - name: Run fallow
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun run fallow -- audit --base "origin/${GITHUB_BASE_REF}"
          else
            bun run fallow
          fi
