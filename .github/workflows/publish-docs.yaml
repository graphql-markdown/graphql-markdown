name: Publish docs
run-name: >-
  ${{ github.event_name == 'workflow_dispatch' 
    && format('Publish docs from #{1} by @{0}', github.actor, github.ref_name) 
    || format('Publish docs release {0}', github.event.release.name)
  }}

env:
  HUSKY: 0

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: publish-docs
  cancel-in-progress: true

jobs:
  publish:
    name: Publish docs
    runs-on: ubuntu-latest
    env:
      SOURCE_DIR: project
      TARGET_DIR: website
      DOCUSAURUS_VERSION: 3
    steps:
      - name: Setup git
        run: |
          git config --global user.name "GraphQL-Markdown bot"
          git config --global user.email "graphql-markdown-bot@edno.io"

      - name: Checkout project repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: ${{ env.SOURCE_DIR }}
          token: ${{ secrets.BOT_PAT }}

      - name: Checkout website repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: graphql-markdown/graphql-markdown.github.io
          path: ${{ env.TARGET_DIR }}
          token: ${{ secrets.BOT_PAT }}

      - name: Setup environment
        uses: ./project/.github/actions/setup
        with:
          working-directory: ${{ env.SOURCE_DIR }}

      - name: Build docs
        run: ./.github/scripts/e2e/build-docs.sh "$DOCUSAURUS_VERSION" "$RUNNER_TEMP/docs-build"
        working-directory: ${{ env.SOURCE_DIR }}
        env:
          REPO_ROOT: ${{ github.workspace }}/${{ env.SOURCE_DIR }}

      - name: Push changes to website repo
        run: |
          cp -Rf ${{ env.SOURCE_DIR }}/website/build/** ${{ env.TARGET_DIR }}/
          cd ${{ env.TARGET_DIR }}
          git add --all
          git commit -am ":memo: update documentation ($GITHUB_SHA)"
          git push
