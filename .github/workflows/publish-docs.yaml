name: Publish docs
run-name: >-
  ${{ github.event_name == 'workflow_dispatch' 
    && format('Publish docs from #{1} by @{0}', github.actor, github.ref_name) 
    || format('Publish docs release {0}', github.event.release.name)
  }}

on:
  workflow_dispatch:
  release:
    types: [published]

concurrency:
  group: publish-docs
  cancel-in-progress: true

jobs:
  publish:
    name: Publish docs
    runs-on: ubuntu-latest
    env:
      SOURCE_DIR: project
      TARGET_DIR: website
      DOCUSAURUS_VERSION: 3
    steps:
      - name: Install Earthly
        uses: earthly/actions-setup@v1
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker login # to avoid dockerhub rate-limiting
        run: docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password "${{ secrets.DOCKERHUB_TOKEN }}"

      - name: Setup git
        run: |
          git config --global user.name "GraphQL-Markdown bot"
          git config --global user.email "graphql-markdown-bot@edno.io"

      - name: Checkout project repo
        uses: actions/checkout@v6
        with:
          path: ${{ env.SOURCE_DIR }}
          token: ${{ secrets.BOT_PAT }}

      - name: Checkout website repo
        uses: actions/checkout@v6
        with:
          repository: graphql-markdown/graphql-markdown.github.io
          path: ${{ env.TARGET_DIR }}
          token: ${{ secrets.BOT_PAT }}

      - name: Build docs
        run: |
          cd ${{ env.SOURCE_DIR }}
          earthly --build-arg VERSION=${{ env.DOCUSAURUS_VERSION }} ./${{ env.TARGET_DIR }}/+build-docs

      - name: Push changes to website repo
        run: |
          cp -Rf ${{ env.SOURCE_DIR }}/build/** ${{ env.TARGET_DIR }}/
          cd ${{ env.TARGET_DIR }}
          git add --all
          git commit -am ":memo: update documentation ($GITHUB_SHA)"
          git push
