name: Smoke Tests

env:
  HUSKY: 0

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    paths:
      - "Earthfile"
      - "tests/*"
      - "packages/**/*"
      - "packages/tooling-config/**/*"
      - "config/**/*"
      - "*.json"
      - "*.mjs"
      - ".github/workflows/smoke.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-docusaurus:
    name: Smoke Tests on Docusaurus ${{ matrix.docusaurus }}
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        docusaurus: [2, 3]
    env:
      SMOKE_TASK: /tests/+smoke-docusaurus-test
    steps:
      - name: Install earthly
        uses: earthly/actions-setup@v1
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Docusaurus Smoke Tests
        run: earthly --ci --build-arg docusaurusVersion=${{ matrix.docusaurus }} github.com/${GITHUB_REPOSITORY}:${GITHUB_REF#refs/heads/}${{ env.SMOKE_TASK}}
        env:
          EARTHLY_NO_CACHE: true

      - name: Docusaurus Production Smoke Build without parameters and local schema
        run: earthly --ci --build-arg docusaurusVersion=${{ matrix.docusaurus }} github.com/${GITHUB_REPOSITORY}:${GITHUB_REF#refs/heads/}${{ env.SMOKE_TASK}}

      - name: Docusaurus Production Smoke Build with parameters and remote schema
        run: earthly --ci --build-arg OPTIONS="$OPTIONS" --build-arg docusaurusVersion=${{ matrix.docusaurus }} github.com/${GITHUB_REPOSITORY}:${GITHUB_REF#refs/heads/}${{ env.SMOKE_TASK}}
        env:
          OPTIONS: "--homepage data/anilist.md --schema https://graphql.anilist.co/ --force"

      - name: Docusaurus Production Smoke Build with groupByDirective option
        run: earthly --ci --build-arg OPTIONS="$OPTIONS" --build-arg docusaurusVersion=${{ matrix.docusaurus }} github.com/${GITHUB_REPOSITORY}:${GITHUB_REF#refs/heads/}${{ env.SMOKE_TASK}}
        env:
          OPTIONS: "--homepage data/groups.md --schema data/schema_with_grouping.graphql --groupByDirective @doc(category|=Common) --base group-by --skip @noDoc"

  smoke-cli:
    name: Smoke Tests on CLI
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    env:
      SMOKE_TASK: /tests/+smoke-cli-test
    steps:
      - name: Install earthly
        uses: earthly/actions-setup@v1
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CLI Smoke Tests
        run: earthly --ci github.com/${GITHUB_REPOSITORY}:${GITHUB_REF#refs/heads/}${{ env.SMOKE_TASK}}
        env:
          EARTHLY_NO_CACHE: true
