name: Smoke Tests

env:
  HUSKY: 0

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    paths:
      - "tests/**/*"
      - "packages/**/*"
      - "packages/tooling-config/**/*"
      - "config/**/*"
      - "*.json"
      - "*.mjs"
      - ".github/actions/**/*"
      - ".github/scripts/**/*"
      - ".github/workflows/smoke.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-docusaurus-test:
    name: Smoke Tests on Docusaurus ${{ matrix.docusaurus }}
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        docusaurus: [2, 3]
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Scaffold Docusaurus project
        uses: ./.github/actions/scaffold-docusaurus
        with:
          docusaurus-version: ${{ matrix.docusaurus }}

      - name: Install e2e webpack test plugin
        run: |
          cd "$PROJECT_DIR"
          npm install --save "$REPO_ROOT/tests/e2e/helpers/e2e-test-webpack-plugin"

      - name: Run Docusaurus Smoke Tests
        run: .github/scripts/e2e/smoke-test.sh docusaurus "$PROJECT_DIR"

  smoke-docusaurus-build:
    name: Smoke Tests on Docusaurus ${{ matrix.docusaurus }} build (${{ matrix.case.name }})
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        docusaurus: [2, 3]
        case:
          - name: local schema, no options
            options: ""
          - name: remote schema with parameters
            options: "--homepage data/anilist.md --schema https://graphql.anilist.co/ --force"
          - name: groupByDirective option
            options: "--homepage data/groups.md --schema data/schema_with_grouping.graphql --groupByDirective @doc(category|=Common) --base group-by --skip @noDoc"
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Scaffold Docusaurus project
        uses: ./.github/actions/scaffold-docusaurus
        with:
          docusaurus-version: ${{ matrix.docusaurus }}

      - name: Docusaurus Production Smoke Build
        env:
          OPTIONS: ${{ matrix.case.options }}
        run: |
          cd "$PROJECT_DIR"
          cp -R "$REPO_ROOT/tests/e2e/__data__/." ./data/
          cp -R "$REPO_ROOT/tests/e2e/docusaurus/__data__/." ./data/
          "$REPO_ROOT/.github/scripts/gqlmd.sh" --options "$OPTIONS"
          bun run build
          bun run clear

  smoke-cli:
    name: Smoke Tests on CLI
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    env:
      REPO_ROOT: ${{ github.workspace }}
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Compute scratch paths
        run: |
          # PROJECT_DIR is exported to the jest e2e config as E2E_ROOT_DIR (__ROOT_DIR__)
          {
            echo "PROJECT_DIR=$RUNNER_TEMP/cli-gqlmd"
            echo "E2E_ROOT_DIR=$RUNNER_TEMP/cli-gqlmd"
            echo "PKG_DIR=$RUNNER_TEMP/pkgs"
          } >> "$GITHUB_ENV"

      - name: Build workspace packages
        run: bun run build

      - name: Pack workspace packages
        run: .github/scripts/pack-packages.sh "$PKG_DIR"

      - name: Scaffold CLI project and install graphql-markdown
        run: .github/scripts/e2e/setup-cli-project.sh "$PROJECT_DIR" "$PKG_DIR"

      - name: Configure multi-instance graphql config
        run: cp tests/e2e/cli/__data__/graphql-doc-generator-multi-instance.config.mjs "$PROJECT_DIR/graphql.config.mjs"

      - name: Run CLI Smoke Tests
        run: .github/scripts/e2e/smoke-test.sh cli "$PROJECT_DIR"
