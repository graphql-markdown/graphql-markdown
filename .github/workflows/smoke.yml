name: Smoke Tests

env:
  HUSKY: 0

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    paths:
      - "tests/**/*"
      - "packages/**/*"
      - "packages/tooling-config/**/*"
      - "config/**/*"
      - "*.json"
      - "*.mjs"
      - ".github/scripts/e2e/**/*"
      - ".github/workflows/smoke.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-docusaurus:
    name: Smoke Tests on Docusaurus ${{ matrix.docusaurus }}
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        docusaurus: [2, 3]
    env:
      REPO_ROOT: ${{ github.workspace }}
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Compute scratch paths
        run: |
          # PROJECT_DIR must match __ROOT_DIR__ hardcoded in tests/e2e/docusaurus/jest.config.mjs
          echo "PROJECT_DIR=/docusaurus-gqlmd" >> "$GITHUB_ENV"
          echo "PKG_DIR=$RUNNER_TEMP/pkgs" >> "$GITHUB_ENV"

      - name: Build workspace packages
        run: bun run build

      - name: Pack workspace packages
        run: .github/scripts/e2e/pack-packages.sh "$PKG_DIR"

      - name: Scaffold Docusaurus project and install graphql-markdown
        run: .github/scripts/e2e/setup-docusaurus-project.sh "${{ matrix.docusaurus }}" "$PROJECT_DIR" "$PKG_DIR"

      - name: Install e2e webpack test plugin
        working-directory: ${{ env.PROJECT_DIR }}
        run: npm install --save "$REPO_ROOT/tests/e2e/helpers/e2e-test-webpack-plugin"

      - name: Run Docusaurus Smoke Tests
        run: .github/scripts/e2e/smoke-test.sh docusaurus "$PROJECT_DIR"

      - name: Docusaurus Production Smoke Build without parameters and local schema
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          rm -rf docs
          cp -R "$REPO_ROOT/tests/e2e/__data__/." ./data/
          cp -R "$REPO_ROOT/tests/e2e/docusaurus/__data__/." ./data/
          "$REPO_ROOT/.github/scripts/e2e/gqlmd.sh"
          bun run build
          bun run clear

      - name: Docusaurus Production Smoke Build with parameters and remote schema
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          rm -rf docs
          cp -R "$REPO_ROOT/tests/e2e/__data__/." ./data/
          cp -R "$REPO_ROOT/tests/e2e/docusaurus/__data__/." ./data/
          "$REPO_ROOT/.github/scripts/e2e/gqlmd.sh" --options "$OPTIONS"
          bun run build
          bun run clear
        env:
          OPTIONS: "--homepage data/anilist.md --schema https://graphql.anilist.co/ --force"

      - name: Docusaurus Production Smoke Build with groupByDirective option
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          rm -rf docs
          cp -R "$REPO_ROOT/tests/e2e/__data__/." ./data/
          cp -R "$REPO_ROOT/tests/e2e/docusaurus/__data__/." ./data/
          "$REPO_ROOT/.github/scripts/e2e/gqlmd.sh" --options "$OPTIONS"
          bun run build
          bun run clear
        env:
          OPTIONS: "--homepage data/groups.md --schema data/schema_with_grouping.graphql --groupByDirective @doc(category|=Common) --base group-by --skip @noDoc"

  smoke-cli:
    name: Smoke Tests on CLI
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    env:
      REPO_ROOT: ${{ github.workspace }}
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Compute scratch paths
        run: |
          # PROJECT_DIR must match __ROOT_DIR__ hardcoded in tests/e2e/cli/jest.config.mjs
          echo "PROJECT_DIR=/cli-gqlmd" >> "$GITHUB_ENV"
          echo "PKG_DIR=$RUNNER_TEMP/pkgs" >> "$GITHUB_ENV"

      - name: Build workspace packages
        run: bun run build

      - name: Pack workspace packages
        run: .github/scripts/e2e/pack-packages.sh "$PKG_DIR"

      - name: Scaffold CLI project and install graphql-markdown
        run: .github/scripts/e2e/setup-cli-project.sh "$PROJECT_DIR" "$PKG_DIR"

      - name: Configure multi-instance graphql config
        run: cp tests/e2e/cli/__data__/graphql-doc-generator-multi-instance.config.mjs "$PROJECT_DIR/graphql.config.mjs"

      - name: Run CLI Smoke Tests
        run: .github/scripts/e2e/smoke-test.sh cli "$PROJECT_DIR"
