name: Smoke Tests

env:
  HUSKY: 0
  EARTHLY_REPOSITORY: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
  EARTHLY_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    paths:
      - "Earthfile"
      - "tests/**/*"
      - "packages/**/*"
      - "packages/tooling-config/**/*"
      - "config/**/*"
      - "*.json"
      - "*.mjs"
      - ".github/workflows/smoke.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-docusaurus:
    name: Smoke Tests on Docusaurus ${{ matrix.docusaurus }}
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        docusaurus: [2, 3]
    env:
      SMOKE_TARGET: smoke-docusaurus-run
    steps:
      - name: Install earthly
        uses: earthly/actions-setup@v1
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Docusaurus Smoke Tests
        run: earthly --ci --build-arg "docusaurusVersion=${{ matrix.docusaurus }}" "github.com/${EARTHLY_REPOSITORY}/tests:${EARTHLY_REF}+${{ env.SMOKE_TARGET }}"
        env:
          EARTHLY_NO_CACHE: true
          SMOKE_TARGET: smoke-docusaurus-test

      - name: Docusaurus Production Smoke Build without parameters and local schema
        run: earthly --ci --build-arg "docusaurusVersion=${{ matrix.docusaurus }}" "github.com/${EARTHLY_REPOSITORY}/tests:${EARTHLY_REF}+${{ env.SMOKE_TARGET }}"

      - name: Docusaurus Production Smoke Build with parameters and remote schema
        run: earthly --ci --build-arg "OPTIONS=$OPTIONS" --build-arg "docusaurusVersion=${{ matrix.docusaurus }}" "github.com/${EARTHLY_REPOSITORY}/tests:${EARTHLY_REF}+${{ env.SMOKE_TARGET }}"
        env:
          OPTIONS: "--homepage data/anilist.md --schema https://graphql.anilist.co/ --force"

      - name: Docusaurus Production Smoke Build with groupByDirective option
        run: earthly --ci --build-arg "OPTIONS=$OPTIONS" --build-arg "docusaurusVersion=${{ matrix.docusaurus }}" "github.com/${EARTHLY_REPOSITORY}/tests:${EARTHLY_REF}+${{ env.SMOKE_TARGET }}"
        env:
          OPTIONS: "--homepage data/groups.md --schema data/schema_with_grouping.graphql --groupByDirective @doc(category|=Common) --base group-by --skip @noDoc"

  smoke-cli:
    name: Smoke Tests on CLI
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    env:
      SMOKE_TARGET: smoke-cli-test
    steps:
      - name: Install earthly
        uses: earthly/actions-setup@v1
        with:
          version: latest
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run CLI Smoke Tests
        run: earthly --ci "github.com/${EARTHLY_REPOSITORY}/tests:${EARTHLY_REF}+${{ env.SMOKE_TARGET }}"
        env:
          EARTHLY_NO_CACHE: true
