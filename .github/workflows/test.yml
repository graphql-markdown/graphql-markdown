name: Test

env:
  HUSKY: 0

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    paths:
      - "packages/**/*"
      - "packages/tooling-config/**/*"
      - "config/**/*"
      - "*.json"
      - "*.mjs"
      - ".github/workflows/test.yml"

jobs:
  test:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          [
            "cli",
            "core",
            "diff",
            "docusaurus",
            "formatters",
            "graphql",
            "helpers",
            "logger",
            "printer-legacy",
            "utils",
          ]

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Cache turbo build setup
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build packages
        run: bun run build

      - name: Run Unit Tests
        id: unit
        run: |
          cd packages/${{ matrix.package }}
          bun test:unit -- --coverage --reporters="github-actions" --reporters="summary"
          [ ! -d "./coverage/" ] && echo "skipped=1" >> "$GITHUB_OUTPUT" && exit 0
          mkdir -p .nyc_output
          mv ./coverage/coverage-final.json .nyc_output/unit.json

      - name: Run Integration Tests
        id: integration
        run: |
          cd packages/${{ matrix.package }}
          bun test:integration -- --coverage --reporters="github-actions" --reporters="summary"
          [ ! -d "./coverage/" ] && echo "skipped=1" >> "$GITHUB_OUTPUT" && exit 0
          mkdir -p .nyc_output
          mv ./coverage/coverage-final.json .nyc_output/integration.json

      - name: Check Code Coverage
        id: coverage
        if: ${{ !steps.unit.outputs.skipped && !steps.integration.outputs.skipped }}
        run: |
          [ ! -d "packages/${{ matrix.package }}/.nyc_output" ] && echo "skipped=1" >> "$GITHUB_OUTPUT" && exit 0
          cd packages/${{ matrix.package }}
          bunx -y --quiet nyc merge .nyc_output .nyc_output/coverage.json
          bunx -y --quiet nyc report --reporter=lcov --reporter=text --temp-dir .nyc_output

      - name: SonarCloud Scan
        id: sonarcloud
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2
        with:
          projectBaseDir: ${{ github.workspace }}
          args: >
            -Dsonar.organization=graphql-markdown
            -Dsonar.projectKey=graphql-markdown_${{ matrix.package }}
            -Dsonar.sources=./packages/${{ matrix.package }}/src
            -Dsonar.tests=./packages/${{ matrix.package }}/tests
            -Dsonar.javascript.lcov.reportPaths=./packages/${{ matrix.package }}/coverage/lcov.info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
