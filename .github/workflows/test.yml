name: Test

env:
  HUSKY: 0

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
    paths:
      - "packages/**/*"
      - "packages/tooling-config/**/*"
      - "config/**/*"
      - "*.json"
      - "*.mjs"
      - ".github/workflows/test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          [
            "cli",
            "core",
            "diff",
            "docusaurus",
            "formatters",
            "graphql",
            "helpers",
            "logger",
            "printer-legacy",
            "utils",
          ]

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup environment
        uses: ./.github/actions/setup

      - name: Cache turbo build setup
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Build packages
        run: bun run build

      - name: Run Unit Tests
        id: unit
        run: |
          cd packages/${{ matrix.package }}
          bun test:unit -- --coverage --reporters="github-actions" --reporters="summary"
          [ ! -d "./coverage/" ] && echo "skipped=1" >> "$GITHUB_OUTPUT" && exit 0
          mkdir -p .nyc_output
          mv ./coverage/coverage-final.json .nyc_output/unit.json

      - name: Run Integration Tests
        id: integration
        run: |
          cd packages/${{ matrix.package }}
          bun test:integration -- --coverage --reporters="github-actions" --reporters="summary"
          [ ! -d "./coverage/" ] && echo "skipped=1" >> "$GITHUB_OUTPUT" && exit 0
          mkdir -p .nyc_output
          mv ./coverage/coverage-final.json .nyc_output/integration.json

      - name: Check Code Coverage
        id: coverage
        if: ${{ !steps.unit.outputs.skipped && !steps.integration.outputs.skipped }}
        run: |
          [ ! -d "packages/${{ matrix.package }}/.nyc_output" ] && echo "skipped=1" >> "$GITHUB_OUTPUT" && exit 0
          cd packages/${{ matrix.package }}
          bunx -y --quiet nyc merge .nyc_output .nyc_output/coverage.json
          bunx -y --quiet nyc report --reporter=lcov --reporter=text --temp-dir .nyc_output

      - name: SonarCloud Scan
        id: sonarcloud
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2
        with:
          projectBaseDir: ${{ github.workspace }}
          args: >
            -Dsonar.organization=graphql-markdown
            -Dsonar.projectKey=graphql-markdown_${{ matrix.package }}
            -Dsonar.sources=./packages/${{ matrix.package }}/src
            -Dsonar.tests=./packages/${{ matrix.package }}/tests
            -Dsonar.javascript.lcov.reportPaths=./packages/${{ matrix.package }}/coverage/lcov.info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
