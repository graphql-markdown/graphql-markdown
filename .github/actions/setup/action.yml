name: Setup environment
description: Install Node.js, Bun 1.3.2, and project dependencies

inputs:
  working-directory:
    description: Directory containing the package.json to install
    required: false
    default: "."

runs:
  using: composite
  steps:
    - name: Setup NodeJS LTS
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
      with:
        node-version: "lts/*"

    - name: Install safe-chain
      shell: bash
      run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/download/1.5.3/install-safe-chain.sh | sh -s -- --ci

    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: "1.3.14"

    - name: Install modules
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun ci
